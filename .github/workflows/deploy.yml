name: Deploy Clicker Web Interface
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-numeric-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev xvfb

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Static Web Customizer
        run: |
          xvfb-run --auto-servernum npx --yes github:yawkat/web-openscad-editor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload web artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'target/web/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
