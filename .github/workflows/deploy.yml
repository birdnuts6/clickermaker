name: Deploy Web Customizer Live

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# CRITICAL FIX: Grants the script explicit system permissions to overwrite and host web assets
permissions:
  contents: read
  pages: write
  id-token: write

# Bypasses the strict Node 20 deprecation errors during the runner environment boot up
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true"

concurrent-deployment:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download your files (index.html, clicker.scad, default.svg)
      - name: Checkout Code Assets
        uses: actions/checkout@v4

      # Step 2: Initialize GitHub's Pages server settings background configuration
      - name: Setup Web Server Environment
        uses: actions/configure-pages@v5

      # Step 3: Bundle your files into a web package (tar archive)
      - name: Package Web Files for Upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Tells it to upload everything in your root folder

      # Step 4: Stream the bundle onto the live web server URL
      - name: Publish Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
