title = "Custom Fidget Clicker Creator"

[[model]]
name = "Clicker Model Creator"
file = "clicker.scad"

[[model.parameter]]
id = "part_to_render"
type = "select"
name = "Select Component to Export"
options = ["housing", "button", "assembled"]

[[model.parameter]]
id = "logo_file"
type = "file"
name = "Upload Custom SVG Shape"
accept = ".svg"

[[model.parameter]]
id = "housing_height"
type = "number"
name = "Housing Case Depth (mm)"
min = 10
max = 25
step = 1

[[model.parameter]]
id = "button_height"
type = "number"
name = "Plunging Cap Height (mm)"
min = 5
max = 15
step = 1

[[model.parameter]]
id = "wall_thickness"
type = "number"
name = "Outer Wall Thickness (mm)"
min = 1.0
max = 3.0
step = 0.2

[[model.parameter]]
id = "tolerance"
type = "number"
name = "3D Printer Slide Tolerance (mm)"
min = 0.1
max = 0.8
step = 0.05
